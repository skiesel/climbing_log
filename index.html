<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Climbing Log</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Send Log">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 500px; margin: 0 auto; padding: 0.5rem; background-color: #f9f9f9; color: #333; }
        .container { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; margin-bottom: 0.75rem; font-size: 1.25rem; }
        h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 1rem; text-align: center; color: #444; }
        .form-group { margin-bottom: 0.75rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: 600; font-size: 0.9rem; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .hidden { display: none; }
        .system-selectors { display: flex; gap: 0.5rem; margin-top: 0.5rem;}
        button { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        #message { margin-top: 0.5rem; text-align: center; font-weight: bold; font-size: 0.9rem;}

        .tabs { display: flex; margin-bottom: 0.5rem; border-bottom: 2px solid #ccc; max-width: 500px; margin: 0 auto 0.5rem auto; }
        .tab-btn { flex: 1; padding: 0.75rem; background: none; color: #666; border: none; font-weight: bold; cursor: pointer; border-radius: 0; }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #fff; }
        .view-section { display: none; max-width: 500px; margin: 0 auto; }
        .view-section.active { display: block; }
        
        .calendar-wrapper { margin-top: 0.5rem; padding-bottom: 0.5rem; }
        .calendar-grid { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; grid-auto-columns: minmax(0, 1fr); gap: 2px; width: 100%; }
        .day-cell {
            width: 100%; aspect-ratio: 1; background-color: #ebedf0; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(8px, 2.5vw, 12px); cursor: pointer;
            transition: filter 0.1s; box-sizing: border-box;
        }
        .day-cell.selected { filter: brightness(0.6); outline: 2px solid #333; outline-offset: -2px; z-index: 10; }

        .intensity-1 { background-color: #9be9a8; }
        .intensity-2 { background-color: #40c463; }
        .intensity-3 { background-color: #30a14e; }
        .intensity-4 { background-color: #216e39; }
        .chart-container { position: relative; width: 100%; margin-top: 0.5rem; } 
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('logView', this)">Log Climb</button>
        <button class="tab-btn" onclick="switchTab('dashboardView', this)">Dashboard</button>
    </div>

    <!-- LOG CLIMB VIEW -->
    <div id="logView" class="view-section active">
        <div class="container">
            <h2>Log a Climb</h2>
            <form id="climbForm">
                
                <div class="form-group">
                    <label for="locationSelect">Location</label>
                    <select id="locationSelect" required>
                        <option value="" disabled selected>Loading Data...</option>
                    </select>
                </div>

                <div class="form-group hidden" id="newLocationGroup">
                    <label for="newLocationInput">New Location Name & Scales</label>
                    <input type="text" id="newLocationInput" placeholder="Enter new location">
                    <div class="system-selectors">
                        <select id="newBoulderScaleSelect" required disabled>
                            <option value="">Boulder Scale</option>
                        </select>
                        <select id="newRouteScaleSelect" required disabled>
                            <option value="">Route Scale</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="climbType">Type</label>
                    <select id="climbType" required disabled>
                        <option value="" disabled selected>Select location first</option>
                        <option value="boulder">Boulder</option>
                        <option value="top_rope">Top Rope</option>
                        <option value="sport">Sport</option>
                        <option value="trad">Trad</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="grade">Grade</label>
                    <select id="grade" required disabled>
                        <option value="" disabled selected>Select a type first</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="send">Send Type</label>
                    <select id="send" required>
                        <option value="" disabled selected>Select outcome</option>
                        <option value="Onsight">Onsight</option>
                        <option value="Flash">Flash</option>
                        <option value="Redpoint">Redpoint</option>
                        <option value="Project (Progress)">Project (Progress)</option>
                        <option value="Project (No Progress)">Project (No Progress)</option>
                        <option value="Bailed">Bailed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="feel">How it felt</label>
                    <select id="feel" required>
                        <option value="" disabled selected>Select feeling</option>
                        <option value="Easy">Easy</option>
                        <option value="Work">Work</option>
                        <option value="Impossible">Impossible</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="climbName">Name (Optional)</label>
                    <input type="text" id="climbName" placeholder="e.g., The Rose">
                </div>

                <div class="form-group">
                    <label for="passcode">Passcode</label>
                    <input type="password" id="passcode" placeholder="Enter secret pin" required>
                </div>

                <button type="submit" id="submitBtn">Save</button>
            </form>
            <div id="message"></div>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboardView" class="view-section">
        <div class="container" style="margin-bottom: 0.5rem;">
            <h2>Activity Calendar</h2>
            <div class="calendar-wrapper">
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <div class="container">
            <h2>Grade Analytics</h2>
            
            <div class="system-selectors">
                <select id="chartTimeFilter" onchange="updateCharts()">
                    <option value="all">All Time</option>
                    <option value="1year">Past Year</option>
                    <option value="6months">Past 6 Months</option>
                    <option value="1month">Past Month</option>
                </select>
                
                <select id="chartTypeFilter" onchange="updateCharts()">
                    <option value="boulder">Bouldering</option>
                    <option value="ropes">Ropes (Sport/Trad/Top Rope)</option>
                </select>
            </div>

            <h3>Total Volume</h3>
            <div class="chart-container" id="pyramidContainer">
                <canvas id="pyramidChart"></canvas>
            </div>

            <h3>Subjective Feel</h3>
            <div class="chart-container" id="feelContainer">
                <canvas id="feelChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzc-nuX3k3dMVc0ldpmntdFCst2biTFGIf_K5K-rT7gVy_BfuLNXmNd73ZaTtK2L0g/exec'; 

        const form = document.getElementById('climbForm');
        const locationSelect = document.getElementById('locationSelect');
        const newLocationGroup = document.getElementById('newLocationGroup');
        const newLocationInput = document.getElementById('newLocationInput');
        const newBoulderScaleSelect = document.getElementById('newBoulderScaleSelect');
        const newRouteScaleSelect = document.getElementById('newRouteScaleSelect');
        const climbTypeSelect = document.getElementById('climbType');
        const gradeSelect = document.getElementById('grade');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        let appData = { locations: [], scaleHeaders: [], scaleRows: [], logs: [] };
        let pyramidChartInstance = null;
        let feelChartInstance = null;
        let selectedDateFilter = null;

        // Helper to format dates locally instead of UTC
        function getLocalYMD(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function restoreFormState() {
            document.getElementById('passcode').value = localStorage.getItem('climbingPasscode') || '';

            const lastLogStr = localStorage.getItem('lastLogTimestamp');
            if (lastLogStr) {
                const lastLogTime = parseInt(lastLogStr, 10);
                const eightHoursMs = 8 * 60 * 60 * 1000;
                
                if (Date.now() - lastLogTime < eightHoursMs) {
                    const lastLoc = localStorage.getItem('lastLocation');
                    if (lastLoc) {
                        locationSelect.value = lastLoc;
                        locationSelect.dispatchEvent(new Event('change')); 
                    }
                    
                    const lastType = localStorage.getItem('lastType');
                    if (lastType) {
                        climbTypeSelect.value = lastType;
                        climbTypeSelect.dispatchEvent(new Event('change')); 
                    }
                    
                    const lastGrade = localStorage.getItem('lastGrade');
                    if (lastGrade) gradeSelect.value = lastGrade;
                    
                    const lastSend = localStorage.getItem('lastSend');
                    if (lastSend) document.getElementById('send').value = lastSend;
                    
                    const lastFeel = localStorage.getItem('lastFeel');
                    if (lastFeel) document.getElementById('feel').value = lastFeel;
                } else {
                    localStorage.removeItem('lastLogTimestamp');
                    localStorage.removeItem('lastLocation');
                    localStorage.removeItem('lastType');
                    localStorage.removeItem('lastGrade');
                    localStorage.removeItem('lastSend');
                    localStorage.removeItem('lastFeel');
                }
            }
        }

        async function loadAppData() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getAppData");
                const result = await response.json();
                
                if(result.success) {
                    appData = result;
                    initializeUI();
                } else {
                    throw new Error("Failed to fetch data payload");
                }
            } catch (error) {
                console.error("Error loading app data:", error);
                locationSelect.innerHTML = '<option value="">Error loading data</option>';
            }
        }

        function initializeUI() {
            locationSelect.innerHTML = '<option value="" disabled selected>Select a location</option>';
            appData.locations.forEach(loc => {
                const option = document.createElement('option');
                option.value = loc.name;
                option.textContent = loc.name;
                locationSelect.appendChild(option);
            });
            
            const newOption = document.createElement('option');
            newOption.value = 'ADD_NEW';
            newOption.textContent = '+ Add New Location...';
            locationSelect.appendChild(newOption);

            climbTypeSelect.disabled = false;
            climbTypeSelect.innerHTML = `
                <option value="" disabled selected>Select type</option>
                <option value="boulder">Boulder</option>
                <option value="top_rope">Top Rope</option>
                <option value="sport">Sport</option>
                <option value="trad">Trad</option>
            `;

            newBoulderScaleSelect.innerHTML = '<option value="" disabled selected>Boulder Scale</option>';
            newRouteScaleSelect.innerHTML = '<option value="" disabled selected>Route Scale</option>';
            
            appData.scaleHeaders.forEach(sys => {
                const bOpt = document.createElement('option'); bOpt.value = sys; bOpt.textContent = sys;
                const rOpt = document.createElement('option'); rOpt.value = sys; rOpt.textContent = sys;
                newBoulderScaleSelect.appendChild(bOpt);
                newRouteScaleSelect.appendChild(rOpt);
            });

            if (appData.logs.length > 0) {
                renderCalendar();
                updateCharts();
            }

            restoreFormState();
        }

        locationSelect.addEventListener('change', (e) => {
            if (e.target.value === 'ADD_NEW') {
                newLocationGroup.classList.remove('hidden');
                newLocationInput.required = true;
                newBoulderScaleSelect.required = true;
                newBoulderScaleSelect.disabled = false;
                newRouteScaleSelect.required = true;
                newRouteScaleSelect.disabled = false;
                newLocationInput.focus();
            } else {
                newLocationGroup.classList.add('hidden');
                newLocationInput.required = false;
                newBoulderScaleSelect.required = false;
                newRouteScaleSelect.required = false;
            }
            
            climbTypeSelect.value = "";
            gradeSelect.innerHTML = '<option value="" disabled selected>Select a type first</option>';
            gradeSelect.disabled = true;
        });

        climbTypeSelect.addEventListener('change', (e) => {
            const selectedType = e.target.value;
            const locationName = locationSelect.value === 'ADD_NEW' ? 'ADD_NEW' : locationSelect.value;
            
            if(!locationName) return;

            let targetSystem = "";
            if (locationName === 'ADD_NEW') {
                targetSystem = selectedType === 'boulder' ? newBoulderScaleSelect.value : newRouteScaleSelect.value;
            } else {
                const locObj = appData.locations.find(l => l.name === locationName);
                if(locObj) {
                    targetSystem = selectedType === 'boulder' ? locObj.boulderScale : locObj.routeScale;
                }
            }

            gradeSelect.innerHTML = '<option value="" disabled selected>Select grade</option>';
            
            if (targetSystem) {
                const systemIndex = appData.scaleHeaders.indexOf(targetSystem);
                if (systemIndex > -1) {
                    const allGrades = appData.scaleRows.map(row => row[systemIndex]).filter(g => g !== "" && g !== undefined);
                    const uniqueGrades = [...new Set(allGrades)];
                    
                    uniqueGrades.forEach(grade => {
                        const option = document.createElement('option');
                        option.value = grade;
                        option.textContent = grade;
                        gradeSelect.appendChild(option);
                    });
                    gradeSelect.disabled = false;
                }
            } else {
                gradeSelect.innerHTML = '<option value="" disabled selected>Finish location setup first</option>';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            messageDiv.textContent = '';

            const isNewLoc = locationSelect.value === 'ADD_NEW';
            const finalLocation = isNewLoc ? newLocationInput.value : locationSelect.value;

            const payload = {
                action: "logClimb",
                location: finalLocation,
                type: climbTypeSelect.value,
                grade: gradeSelect.value,
                send: document.getElementById('send').value,
                feel: document.getElementById('feel').value,
                name: document.getElementById('climbName').value,
                passcode: document.getElementById('passcode').value,
                newBoulderScale: isNewLoc ? newBoulderScaleSelect.value : null,
                newRouteScale: isNewLoc ? newRouteScaleSelect.value : null
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (!result.success) throw new Error(result.error || 'Server rejected the request'); 

                messageDiv.style.color = 'green';
                messageDiv.textContent = 'Climb logged successfully!';
                
                localStorage.setItem('climbingPasscode', payload.passcode);
                localStorage.setItem('lastLogTimestamp', Date.now().toString()); 
                localStorage.setItem('lastLocation', payload.location);
                localStorage.setItem('lastType', payload.type);
                localStorage.setItem('lastGrade', payload.grade);
                localStorage.setItem('lastSend', payload.send);
                localStorage.setItem('lastFeel', payload.feel);
                
                form.reset();
                newLocationGroup.classList.add('hidden');
                gradeSelect.disabled = true;
                gradeSelect.innerHTML = '<option value="" disabled selected>Select a type first</option>';
                
                restoreFormState();
                loadAppData(); 

            } catch (error) {
                console.error("Error saving:", error);
                messageDiv.style.color = 'red';
                messageDiv.textContent = error.message === 'Invalid Passcode' ? 'Incorrect Passcode!' : 'Error saving climb.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save';
            }
        });

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        const icons = { boulder: '👜', sport: '🔗', trad: '🔩', top_rope: '🪢' };

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const daysMap = {};
            appData.logs.forEach(climb => {
                const dateObj = new Date(climb.date);
                if (isNaN(dateObj.getTime())) return; 
                const dateStr = getLocalYMD(dateObj);
                
                if (!daysMap[dateStr]) daysMap[dateStr] = { count: 0, types: {} };
                daysMap[dateStr].count++;
                
                if (!daysMap[dateStr].types[climb.type]) daysMap[dateStr].types[climb.type] = 0;
                daysMap[dateStr].types[climb.type]++;
            });

            const today = new Date();
            for (let i = 55; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const dateStr = getLocalYMD(d);
                
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                if (daysMap[dateStr]) {
                    const data = daysMap[dateStr];
                    if (data.count > 0) cell.classList.add('intensity-1');
                    if (data.count > 3) cell.classList.add('intensity-2');
                    if (data.count > 6) cell.classList.add('intensity-3');
                    if (data.count > 10) cell.classList.add('intensity-4');

                    const dominantType = Object.keys(data.types).reduce((a, b) => data.types[a] > data.types[b] ? a : b);
                    cell.textContent = icons[dominantType] || '';
                    cell.title = `${dateStr}: ${data.count} climbs`; 
                }

                cell.onclick = () => {
                    selectedDateFilter = (selectedDateFilter === dateStr) ? null : dateStr;
                    renderCalendar(); 
                    updateCharts(); 
                };

                if (selectedDateFilter === dateStr) cell.classList.add('selected');
                grid.appendChild(cell);
            }
        }

        function updateCharts() {
            const typeFilter = document.getElementById('chartTypeFilter').value;
            const timeFilter = document.getElementById('chartTimeFilter').value;
            const isBoulder = typeFilter === 'boulder';

            // Calculate Date Filter
            const now = new Date();
            let cutoffDate = null;
            if (timeFilter === '1month') cutoffDate = new Date(now.setMonth(now.getMonth() - 1));
            else if (timeFilter === '6months') cutoffDate = new Date(now.setMonth(now.getMonth() - 6));
            else if (timeFilter === '1year') cutoffDate = new Date(now.setFullYear(now.getFullYear() - 1));

            // Tally structures
            const rowCounts = {};
            const feelCounts = {}; 

            // 1. Identify active systems to build the complete Y-axis
            const activeSystems = new Set();
            appData.locations.forEach(loc => {
                const sys = isBoulder ? loc.boulderScale : loc.routeScale;
                if (sys) activeSystems.add(sys);
            });
            
            const activeIndices = [];
            activeSystems.forEach(sys => {
                const idx = appData.scaleHeaders.indexOf(sys);
                if (idx > -1) activeIndices.push(idx);
            });

            // 2. Loop through logs and tally them
            appData.logs.forEach(climb => {
                const climbDateObj = new Date(climb.date);
                
                // Apply Time Filter
                if (cutoffDate && climbDateObj < cutoffDate) return;

                // Apply Calendar Selection Filter
                if (selectedDateFilter) {
                    const climbDateStr = getLocalYMD(climbDateObj);
                    if (climbDateStr !== selectedDateFilter) return;
                }

                const isClimbBoulder = climb.type === 'boulder';
                if (isBoulder === isClimbBoulder) {
                    let rowIndex = -1;
                    const loc = appData.locations.find(l => l.name === climb.location);
                    
                    if (loc) {
                        const systemName = isClimbBoulder ? loc.boulderScale : loc.routeScale;
                        const systemIndex = appData.scaleHeaders.indexOf(systemName);
                        if (systemIndex > -1) {
                            rowIndex = appData.scaleRows.findIndex(row => row[systemIndex] === climb.grade);
                        }
                    }

                    // Smart Fallback Search
                    if (rowIndex === -1) {
                        for (let colIdx of activeIndices) {
                            rowIndex = appData.scaleRows.findIndex(row => row[colIdx] === climb.grade);
                            if (rowIndex > -1) break; 
                        }
                    }

                    if (rowIndex === -1) return; 
                    
                    // Tally for Pyramid
                    rowCounts[rowIndex] = (rowCounts[rowIndex] || 0) + 1;

                    // Tally for Feel Chart
                    if (!feelCounts[rowIndex]) feelCounts[rowIndex] = { Easy: 0, Work: 0, Impossible: 0 };
                    if (feelCounts[rowIndex][climb.feel] !== undefined) {
                        feelCounts[rowIndex][climb.feel]++;
                    }
                }
            });

            // 3. Prepare Chart.js formatted data arrays
            const labels = [];
            const pyramidData = [];
            const feelData = { Easy: [], Work: [], Impossible: [] };

            appData.scaleRows.forEach((row, rowIndex) => {
                const rowGrades = new Set();
                activeIndices.forEach(colIdx => {
                    const gradeVal = row[colIdx];
                    if (gradeVal && gradeVal !== "") rowGrades.add(gradeVal);
                });

                if (rowGrades.size > 0) {
                    const gradeStrings = Array.from(rowGrades).join(' / ');
                    labels.push(`Lv ${rowIndex + 1} (${gradeStrings})`);
                    
                    pyramidData.push(rowCounts[rowIndex] || 0);
                    
                    const fCount = feelCounts[rowIndex] || { Easy: 0, Work: 0, Impossible: 0 };
                    feelData.Easy.push(fCount.Easy);
                    feelData.Work.push(fCount.Work);
                    feelData.Impossible.push(fCount.Impossible);
                }
            });

            // 4. Update Container Heights Dynamically
            const chartHeight = `${labels.length * 30 + 40}px`;
            document.getElementById('pyramidContainer').style.height = chartHeight;
            document.getElementById('feelContainer').style.height = chartHeight;

            // 5. Render Pyramid
            if (pyramidChartInstance) pyramidChartInstance.destroy();
            const ctxPyramid = document.getElementById('pyramidChart').getContext('2d');
            pyramidChartInstance = new Chart(ctxPyramid, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Climbs',
                        data: pyramidData,
                        backgroundColor: '#2563eb',
                        borderRadius: 4
                    }]
                },
                options: { 
                    indexAxis: 'y', 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: { legend: { display: false } }
                }
            });

            // 6. Render Feel Chart
            if (feelChartInstance) feelChartInstance.destroy();
            const ctxFeel = document.getElementById('feelChart').getContext('2d');
            feelChartInstance = new Chart(ctxFeel, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Easy', data: feelData.Easy, backgroundColor: '#4ade80' }, // Green
                        { label: 'Work', data: feelData.Work, backgroundColor: '#facc15' }, // Yellow
                        { label: 'Impossible', data: feelData.Impossible, backgroundColor: '#f87171' } // Red
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } },
                        y: { stacked: true }
                    },
                    plugins: { 
                        legend: { position: 'top', labels: { boxWidth: 12 } } 
                    }
                }
            });
        }

        // Boot up the app
        loadAppData();
    </script>
</body>
</html>
